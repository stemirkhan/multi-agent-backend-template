- `docs/final-review.md`: итоговый gate decision, агрегированные issues, blocker status, рекомендуемый следующий шаг. Обновить `Status:` с `template` на рабочее значение.
- Короткий итог: `gate = pass|fail`, какие findings стали blocker, кому возвращать задачу.
