[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 4

[agents.orchestrator]
description = "Orchestrator: runs 3-phase flow and assigns work."
config_file = "agents/orchestrator.toml"

[agents.api]
description = "API: OpenAPI contract and operation inventory."
config_file = "agents/api.toml"

[agents.worker]
description = "Worker: backend implementation against OpenAPI contract."
config_file = "agents/worker.toml"

[agents.tests]
description = "Tests: operation-level tests and check execution."
config_file = "agents/tests.toml"

[agents.gatekeeper]
description = "Gatekeeper: final pass/fail decision and final-review artifact."
config_file = "agents/gatekeeper.toml"
