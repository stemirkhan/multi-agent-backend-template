[features]
multi_agent = true

[agents]
max_threads = 12
max_depth = 6

[agents.orchestrator]
description = "Оркестратор: управляет фазами, собирает результаты, ловит конфликты."
config_file = "agents/orchestrator.toml"

[agents.architect]
description = "Архитектура: NFR, границы модулей, решения по очередям/кэшу."
config_file = "agents/architect.toml"

[agents.api]
description = "API: контракты, OpenAPI, схемы, ошибки, пагинация, идемпотентность."
config_file = "agents/api.toml"

[agents.db]
description = "DB: схема, миграции Alembic, индексы, сиды."
config_file = "agents/db.toml"

[agents.devenv]
description = "Dev Environment: поднимает локальные сервисы, API и dev entrypoint'ы."
config_file = "agents/devenv.toml"

[agents.worker]
description = "Implementation: пишет код фич строго по контрактам API/DB/Architect."
config_file = "agents/worker.toml"

[agents.tests]
description = "Tests: unit+integration+contract, фикстуры, матрица доступов."
config_file = "agents/tests.toml"

[agents.security-reviewer]
description = "Security Review: access control, ownership, auth/rbac, secret leakage."
config_file = "agents/security-reviewer.toml"

[agents.consistency-reviewer]
description = "Consistency Review: idempotency, transactions, races, duplicate side effects."
config_file = "agents/consistency-reviewer.toml"

[agents.performance-reviewer]
description = "Performance Review: N+1, indexes, heavy sorts, query bottlenecks."
config_file = "agents/performance-reviewer.toml"

[agents.gatekeeper]
description = "Gatekeeper: агрегирует review-findings и ставит финальный gate."
config_file = "agents/gatekeeper.toml"

[agents.explorer]
description = "Explorer: read-only, читает код/ТЗ, делает карту проекта."
config_file = "agents/explorer.toml"

[agents.monitor]
description = "Monitor: read-only, запускает команды и суммаризирует вывод."
config_file = "agents/monitor.toml"
